services:
  - type: web
    name: openclaw
    runtime: docker
    plan: free
    healthCheckPath: /health
    envVars:
      # Web service port
      - key: PORT
        value: "8080"
      
      # OpenClaw setup password (set in Render dashboard)
      - key: OPENCLAW_PASSWORD
        value: "<YOUR_OPENCLAW_PASSWORD>"

      # Ephemeral storage directories (free tier)
      - key: OPENCLAW_STATE_DIR
        value: /tmp/.openclaw
      - key: OPENCLAW_WORKSPACE_DIR
        value: /tmp/workspace

      # OpenClaw gateway token (auto-generated)
      - key: OPENCLAW_GATEWAY_TOKEN
        generateValue: true

      # Telegram integration (set in Render dashboard)
      - key: TELEGRAM_BOT_TOKEN
        value: "<YOUR_TELEGRAM_BOT_TOKEN>"
      - key: TELEGRAM_CHAT_ID
        value: "<YOUR_TELEGRAM_CHAT_ID>"

      # LLM provider configuration (Groq)
      - key: LLM_PROVIDER
        value: "groq"
      - key: LLM_API_KEY
        value: "<YOUR_GROQ_API_KEY>"
      - key: LLM_MODEL
        value: "small-llama"

      # Optional: async loop delay in seconds
      - key: SCAN_LOOP_DELAY
        value: "10"